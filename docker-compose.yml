services:
  # ===== Milvus 依赖: etcd =====
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: rag-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    volumes:
      - rag-etcd:/etcd
    networks:
      - rag-net

  # ===== Milvus 依赖: minio (对象存储) =====
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: rag-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - rag-minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - rag-net

  # ===== Milvus 服务端 =====
  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: rag-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      common.security.authorizationEnabled: "false"
    volumes:
      - rag-milvus:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - rag-net

  # ===== RAG 应用 =====
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    restart: unless-stopped
    env_file: rag_basic/.env
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
    ports:
      - "5003:5003"
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      PYTHONUNBUFFERED: "1"
    depends_on:
      milvus:
        condition: service_started
    networks:
      - rag-net

volumes:
  rag-etcd:
  rag-minio:
  rag-milvus:

networks:
  rag-net:
    driver: bridge
